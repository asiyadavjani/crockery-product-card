<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dinnerset card </title>
   

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="./large.css" media="(max-width:1500px)">
   <link rel="stylesheet" href="./medium.css" media="(max-width:1050px)">
   <link rel="stylesheet" href="./small.css" media="(max-width:850px)">
   <link rel="stylesheet" href="./xsmall.css" media="(max-width:650px)">
  <link rel="stylesheet" href="./mini.css" media="(max-width:500px)">
   
</head>
<body>
    <div class="wrapper">
        <div class="box">
            <h1>European Porcelain Dinner Set</h1>
            <h3>code 12345</h3>
            <h2>R$ 36000</h2>
            <h4>select colour</h4>
            <div class="colouroption"><img class="thumb" width="80" height="80" src="./pic1.jpg" alt=" green dinnerset">
                    <img class="thumb" width="80" height="80" src="./pic 2.jpg" alt="white dinnerset">
                    <img class="thumb" width="80" height="80" src="./pic 3.avif" alt=" seagreen dinnerset">
                    <img class="thumb" width="80" height="80" src="./pic 4.avif" alt=" double shade dinnerset"></div>
            <h5>35Pcs Set Includes:</h5>
            <ul>
                <li>Dinner Plates</li>

<li>Deep Plates</li>

<li>Side / Quarter Plates</li>

<li>Soup / Cereal Bowls</li>

<li>Cups & Saucers</li>
            </ul>
            <button>ADD TO CART</button>
            
                    <div class="productcard">
                <img id="mainImage" width="500" height="380" src="./pic 2.jpg" alt="black dinnerset">
            
               <i class="fa-solid fa-share-nodes"></i>
                <div id="heart"><i class="fa-regular fa-heart"></i></div>
                <div class="productvarity">
                    <img class="thumb" width="121" height="100" src="./pic1.jpg" alt=" green dinnerset">
                    <img class="thumb" width="121" height="100" src="./pic 2.jpg" alt="white dinnerset">
                    <img class="thumb" width="121" height="100" src="./pic 3.avif" alt=" seagreen dinnerset">
                    <img class="thumb" width="121" height="100" src="./pic 4.avif" alt=" double shade dinnerset">
                </div>
            </div>

        </div>
    </div>

    <script src="./app.js"></script>
</body>
</html>
